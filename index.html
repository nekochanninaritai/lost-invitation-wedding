<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蝶が運ぶ、最後の祝福</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260629-picturebook">
</head>
<body>
  <div class="decorative-layer" aria-hidden="true">
    <span class="mansion-silhouette"></span>
    <span class="cobblestone-path"></span>
    <span class="music-note note-1">♪</span>
    <span class="music-note note-2">♫</span>
    <span class="music-note note-3">♬</span>
    <span class="music-note note-4">♪</span>
    <span class="butterfly butterfly-1"></span>
    <span class="butterfly butterfly-2"></span>
    <span class="butterfly butterfly-3"></span>
    <span class="sparkle sparkle-1"></span>
    <span class="sparkle sparkle-2"></span>
    <span class="sparkle sparkle-3"></span>
    <span class="sparkle sparkle-4"></span>
    <span class="sparkle sparkle-5"></span>
    <span class="leaf leaf-1"></span>
    <span class="leaf leaf-2"></span>
    <span class="leaf leaf-3"></span>
    <span class="light-orb light-orb-1"></span>
    <span class="light-orb light-orb-2"></span>
    <span class="musicbox-object musicbox-disc"></span>
    <span class="musicbox-object musicbox-gear gear-1"></span>
    <span class="musicbox-object musicbox-gear gear-2"></span>
    <span class="gold-dust dust-1"></span>
    <span class="gold-dust dust-2"></span>
    <span class="gold-dust dust-3"></span>
    <span class="gold-dust dust-4"></span>
    <span class="gold-dust dust-5"></span>
    <span class="gold-dust dust-6"></span>
    <span class="light-ribbon"></span>
  </div>

  <button class="audio-start" type="button" id="audio-start">音楽を再生</button>
  <button class="audio-toggle" type="button" id="audio-toggle" aria-pressed="false" aria-label="音のオンオフ">音 OFF</button>

  <main class="app-shell">
    <div class="book-status" aria-live="polite">
      <span id="page-count"></span>
      <span class="musicbox-gauge" id="musicbox-gauge" aria-label="オルゴールの完成度"></span>
      <span id="restore-count"></span>
    </div>

    <section id="book" class="book" aria-live="polite"></section>
  </main>

  <script src="script.js?v=20260629-picturebook"></script>
</body>
</html>
